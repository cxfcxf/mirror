name: Build and Publish Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install NDK and CMake
        run: |
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Cache NDK build output
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: cxx-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/**', 'app/build.gradle.kts') }}
          restore-keys: cxx-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n' > keystore_b64
          base64 -d keystore_b64 > keystore.jks

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          CLEAN_VERSION=$(echo "$VERSION" | sed 's/^v//')
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "storeFile=${{ github.workspace }}/keystore.jks" >> local.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> local.properties
          echo "keyAlias=$KEY_ALIAS" >> local.properties
          echo "keyPassword=$KEY_PASSWORD" >> local.properties
          ./gradlew \
            -PversionName="$CLEAN_VERSION" \
            -PversionCode="$VERSION_CODE" \
            assembleRelease

      - name: Stage APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk artifacts/mirror-${{ env.VERSION }}.apk

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$VERSION" \
            --title "Mirror $VERSION" \
            --notes "Android TV AirPlay Receiver $VERSION" \
            artifacts/mirror-${{ env.VERSION }}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirror-${{ env.VERSION }}
          path: artifacts/mirror-${{ env.VERSION }}.apk
